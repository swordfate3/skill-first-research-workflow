<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Research Workflow Outputs</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Skill-First Research Workflow</p>
        <h1>研究输出</h1>
      </div>
      <button id="refreshButton" type="button">刷新</button>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section class="upload-panel" aria-label="上传论文">
          <div class="sidebar-title">上传</div>
          <button id="uploadButton" type="button">上传 PDF</button>
          <input id="paperUploadInput" type="file" accept=".pdf,application/pdf" multiple hidden>
          <div id="uploadHint" class="upload-hint">支持多选 PDF，上传后会自动开始处理。</div>
          <div id="uploadStatusList" class="upload-status-list"></div>
        </section>
        <section class="state-panel">
          <div class="sidebar-title">状态</div>
          <div id="stateSummary" class="state-summary">加载中...</div>
        </section>
        <section class="filter-panel" aria-label="文档类型筛选">
          <div class="sidebar-title">筛选</div>
          <div class="filter-bar">
            <button class="filter-chip active" type="button" data-filter="all">all</button>
            <button class="filter-chip" type="button" data-filter="paper_card">paper_card</button>
            <button class="filter-chip" type="button" data-filter="collision">collision</button>
            <button class="filter-chip" type="button" data-filter="direction">direction</button>
          </div>
        </section>
        <div class="sidebar-title">文档</div>
        <div id="documentList" class="document-list"></div>
      </aside>

      <section class="reader">
        <div id="emptyState" class="empty-state">
          把 Markdown 输出写入 <code>workspace/outputs/</code>，然后点击刷新。
        </div>
        <article id="documentView" class="document-view hidden"></article>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
